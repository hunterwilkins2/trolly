version: '3.9'
services:
  app:
    container_name: trolly
    build:
      context: ../..
      dockerfile: ./devops/docker/Dockerfile
    restart: always
    ports:
      - 4000:4000
    command: ["-env production -dsn trolly:secret_trolly_password@tcp(db)/trolly?parseTime=true"]
    depends_on:
      db:
        condition: service_healthy
  migrations:
    image: migrate/migrate
    command: ["-path=/migrations -database mysql://trolly:secret_trolly_password@tcp(db)/trolly up"]
    volumes:
      - ../../migrations:/migrations
    depends_on:
      db:
        condition: service_healthy
  db:
    container_name: trolly_db
    image: jsurf/rpi-mariadb
    restart: always
    environment:
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
      - MYSQL_USER=trolly
      - MYSQL_PASSWORD=secret_trolly_password
      - MYSQL_DATABASE=trolly
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 5
    volumes:
      - trolly_db:/var/lib/mysql
volumes:
  trolly_db:
  migrations:
{{define "base"}}
<!doctype html>
<html lang='en'>
    <head>
        <meta charset='utf-8'>
        <title>{{template "title".}} - Trolly</title>

        <link  rel='stylesheet' href="/static/css/main.css">
    </head>
    <body>
        {{template "nav" .}}
        <main>
            {{with .Flash}}
                <div class="flash">{{.}}</div>
            {{end}}
            {{template "main" .}}
        </main>
        <footer>
            Powered by <a href="https://golang.org/">Go</a> in {{.CurrentYear}}
        </footer>
    </body>
</html>
{{end}}
